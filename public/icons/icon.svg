<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>

  <!-- Subtle pitch lines in background -->
  <line x1="30" y1="96" x2="162" y2="96" stroke="white" stroke-width="1" opacity="0.06"/>
  <line x1="30" y1="76" x2="162" y2="76" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="30" y1="116" x2="162" y2="116" stroke="white" stroke-width="0.5" opacity="0.04"/>

  <!-- Cricket bat (rotated ~-38deg, handle top-right) -->
  <g transform="rotate(-38, 78, 94)">
    <!-- Handle -->
    <rect x="72" y="18" width="13" height="40" rx="6" fill="#d97706"/>
    <!-- Grip stripes -->
    <rect x="71" y="20" width="15" height="5" rx="2.5" fill="#92400e" opacity="0.75"/>
    <rect x="71" y="28" width="15" height="5" rx="2.5" fill="#92400e" opacity="0.75"/>
    <rect x="71" y="36" width="15" height="5" rx="2.5" fill="#92400e" opacity="0.75"/>
    <!-- Shoulder (transition) -->
    <path d="M 70 55 Q 66 52 62 56 L 62 60 Q 66 56 72 58 Q 78 60 84 58 L 84 54 Q 80 52 76 55 Z" fill="#fef3c7" opacity="0.9"/>
    <!-- Blade -->
    <rect x="60" y="56" width="37" height="95" rx="10" fill="#fef9ee"/>
    <!-- Blade edge highlight left -->
    <rect x="60" y="56" width="7" height="95" rx="9" fill="white" opacity="0.25"/>
    <!-- Blade centre ridge -->
    <rect x="76" y="66" width="5" height="72" rx="2.5" fill="white" opacity="0.15"/>
  </g>

  <!-- Cricket ball -->
  <circle cx="124" cy="120" r="29" fill="url(#ball)"/>
  <!-- Shine highlight -->
  <ellipse cx="114" cy="110" rx="9" ry="7" fill="white" opacity="0.22" transform="rotate(-20, 114, 110)"/>
  <!-- Seam curve 1 -->
  <path d="M 101 116 Q 113 106 125 116 Q 133 124 130 133" fill="none" stroke="#fecaca" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Seam curve 2 (other side) -->
  <path d="M 118 97 Q 130 94 136 104 Q 141 114 138 124" fill="none" stroke="#fecaca" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Seam stitch dots -->
  <circle cx="115" cy="112" r="1.2" fill="#fecaca"/>
  <circle cx="119" cy="109" r="1.2" fill="#fecaca"/>
  <circle cx="123" cy="107" r="1.2" fill="#fecaca"/>
</svg>
