<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/cricpad/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/cricpad/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CricPad" />
    <link rel="apple-touch-icon" href="/cricpad/icons/icon-192.png" />
    <title>CricPad</title>
    <script>if (localStorage.getItem('theme') !== 'light') document.documentElement.classList.add('dark')</script>
    <!-- Google Analytics 4: set VITE_GA_ID in GitHub → Settings → Secrets → Actions -->
    <script>
      (function() {
        var id = '%VITE_GA_ID%';
        if (!id || id.indexOf('VITE_') !== -1) return; // not configured
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){window.dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id, { send_page_view: false }); // page views sent manually per SPA route
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
